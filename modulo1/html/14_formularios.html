<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1>Formularios</h1>
    <form action="/procesar" method="post">
        <table>
            <tr>
                <td>
                    <label for="nombre">Nombre:</label>
                    <input type="text" name="nombre" id="nombre">
                </td>
                <td>
                    <label>Correo Electronico <br>
                        <input type="email" id="email" name="email">
                    </label><br>
                </td>
            <tr>
                <td>
                    <label for="password">Contraseña</label><br>
                    <input type="password" name="password" id="password">
                </td>
                <td>
                    <label for="teledono">Telefono</label><br>
                    <input type="tel" name="telefono" id="telefono">
                </td>
            </tr>
                <td>
                    <label for="url">Sitio Web</label><br>
                    <input type="url" name="url" id="url">
                </td>
                <td>
                    <label for="buscar">buscar</label><br>
                    <input type="search" name="buscar" id="buscar">
                </td>  
            </tr>
            
            <!--Tipos Numericos-->
            <tr>
                <td>
                    <label for="edad">Edad</label><br>
                    <input type="number" name="edad" id="edad" min="0" max="120" step="1">
                </td>
                <td>
                    <label for="volumen">Volumen<span id="val-vol"></span></label>
                    <input type="range" name="volumen" id="volumen" min="0" max="120" value="1"
                    oninput="document.getElementById('val-vol').textContent=this.value">

                </td>
            </tr>


            <!--Tipos fecha-->
            <tr>
                <td colspan="2">
                    <h3>Tipo de fechas</h3>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="fecha">Fecha de nacimiento</label><br>
                    <input type="date" name="fecha" id="fecha">
                </td>
                <td>
                    <label for="hora">Hora de la cita</label><br>
                    <input type="time" name="hora" id="hora">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="evento">Inicio del evento</label><br>
                    <input type="datetime-local" name="evento" id="evento">
                </td>
                <td>
                    <label for="mes">Mes de inico</label><br>
                    <input type="month" name="mes" id="mes">
                </td>
            </tr>


            <!--Checkbox - option-->
            <tr>
                <td colspan="2">
                    <h3>Checkbox y Option</h3>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="checkbox" name="acepto" id="acepto">
                    <label for="acepto">Acepto los terminos y condiciones</label>
                </td>
                <td>
                    <fieldset>
                     <legend>
                         Metodo de pago
                     </legend>
                     <input type="radio" name="pago" id="tarjeta" value="tarjeta">
                     <label for="tarjeta">Tarjeta de Credito</label>
                     <input type="radio" name="pago" id="paypal" value="paypal">
                     <label for="paypal">Tarjeta de Credito</label>
                     <input type="radio" name="pago" id="transferencia" value="transferencia">
                     <label for="transferencia">Tarjeta de Credito</label>
                    </fieldset>
                 </td>
            </tr>


            <!--Utiles-->

            <tr>
                <td colspan="2">
                    <h3>Utiles</h3>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="color">Color</label>
                    <input type="color" name="color" id="color" value="#3b82f6">
                </td>
            </tr>
            <tr>
                <td>
                  <label for="foto">Foto de perfil</label>
                  <input type="file" name="foto" id="foto" value="image/">
                </td>
            </tr>
            <tr>
                <td>
                  <label for="docs">Documentos</label>
                  <input type="file" name="docs" id="docs" accept=".pdf,.doc,.docx">
                </td>
                <td>
                    <input type="hidden" name="token" id="token" value="abcd123xyz">
                </td>
            </tr>

            <!--TexArea y Select-->

        <tr>
            <td colspan="2">
                <h3>Textarea y Select</h3>
            </td>
        </tr>
        <tr>
            <td>
                <label for="mensaje">Mensaje</label><br>
                <textarea name="mensaje" id="mensaje" rows="6" cols="50" placeholder="Escribe tu mesaje aqui"></textarea>
            </td>
            <td>
                <!--Select Basico-->
                <label for="pais">Pais</label>
                <select name="pais" id="pais">
                    <option value="">Seleccione un pais</option>
                    <option value="co">Colombia</option>
                    <option value="ec">Ecuador</option>
                    <option value="es">España</option>
                    <option value="ve">Venezuela</option>
                </select>
            </td>
            <td>
                <!--Select con optgropu-->
                <label for="ciudad">Ciudades</label>
                <select name="ciudad" id="ciudad">
                    <optgroup label="España">
                        <option value="mad">Madrid</option>
                        <option value="bcn">Barcelona</option>
                        <option value="sev">Sevilla</option>
                    </optgroup>
                    <optgroup label="Mexico">
                        <option value="cdmx">Ciudad de Mexico</option>
                        <option value="gdl">Guadalajara</option>
                    </optgroup>
                    <optgroup label="Venezuela">
                        <option value="cor">Coro</option>
                        <option value="mar">Maracaibo</option>
                    </optgroup>
                </select>
            </td>
            <td>
                <!--Seleccion multiple-->
                <label for="skill">Habilidades</label><br>
                <select name="habilidades" id="skill" multiple size="4">
                    <option value="html">HTML</option>
                    <option value="ccs3">CSS3</option>
                    <option value="js">JavaScript</option>
                    <option value="ts">Typescript</option>
                </select>

            </td>
        </tr>




        </table>


        <button type="submit">Enviar</button><br>
        <button type="reset">Limpiar</button><br>
        <button type="button">Aceptar</button><br>
    </form>

    
    
</body>
</html>
