<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1>Formularios</h1>
    <form action="/procesar" method="post">
        <table>
            <tr>
                <td>
                    <label for="nombre">Nombre:</label><br>
                    <input type="text" name="nombre" id="nombre">
                </td>
                <td>
                    <label>Correo Electronico <br>
                        <input type="email" id="email" name="email">
                    </label><br>
                </td>
                <td>
                    <label for="password">Contraseña</label><br>
                    <input type="password" name="password" id="password">
                    <button type="submit">Enviar</button>
                </td>
                <td>
                    <label for="url">Sitio Web</label><br>
                    <input type="url" name="url" id="url">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="teledono">Telefono</label><br>
                    <input type="tel" name="telefono" id="telefono">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="buscar">buscar</label><br>
                    <input type="search" name="buscar" id="buscar">
                </td>
            </tr>
            
            <!--Tipos Numericos-->
            <tr>
                <td>
                    <label for="edad">Edad</label><br>
                    <input type="number" name="edad" id="edad" min="0" max="120" step="1">
                </td>
                <td>
                    <label for="volumen">Volumen<span id="val-vol"></span></label>
                    <input type="range" name="volumen" id="volumen" min="0" max="120" value="1"
                    oninput="document.getElementById('val-vol').textContent=this.value">

                </td>
            </tr>


        </table>
    </form>

    
    
</body>
</html>
