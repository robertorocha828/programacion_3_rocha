<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Formulario con validacion</h1>
    <form action="/procesar" method="post">
        <fieldset>
            <legend>Campo obligatorio</legend>
            <label for="nombre">Nombre</label>
            <input type="text" name="nombre" id="nombre">
        </fieldset>
        <fieldset>
            <legend>Minlength / Maxlength</legend>
            <label for="apellido">Apellido</label>
            <input type="text" name="apellido" id="apellido" min="18" max="99">
        </fieldset>
        <fieldset>
            <legend>Patron de caracteres - expresion regular</legend>
            <label for="codigo_postal">Codigo postal</label>
            <input type="email" name="codigo_postal" id="codigo_postal" pattern="[0-9]{5}">
        </fieldset>
        <fieldset>
            <legend>min / max rango de numeros</legend>
            <label for="edad">Edad</label>
            <input type="number" name="edad" id="edad" min="18" max="99">
        </fieldset>
        <fieldset>
            <legend>Desabilidato</legend>
            <label for="ref">Referencia</label>
            <input type="text" name="ref" id="ref" value="REF-001" disabled>
        </fieldset>
        <fieldset>
            <legend>Solo lectura</legend>
            <label for="pais">Pais</label>
            <input type="text" name="pais" id="pais" value="Ecuador" readonly>

        </fieldset>
    </form>
    
</body>
</html>
